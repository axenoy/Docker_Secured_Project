services:
  database:
    build:
      context: ./sql
    image: ${DB_CONTAINER_NAME}:latest
    container_name: ${DB_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - db-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  backend:
    build:
      context: ./backend
    image: ${BACKEND_CONTAINER_NAME}:latest
    container_name: ${BACKEND_CONTAINER_NAME}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:uid=1000,gid=1000
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    deploy:
      resources:
        limits: 
          cpus: '3.0'
          memory: 4096M
          pids: 200
        reservations:
          cpus: '1.0'
          memory: 2048M
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    networks:
      - db-net
      - backend-net
    depends_on:
      - database

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: ${NGINX_CONTAINER_NAME}:latest
    container_name: ${NGINX_CONTAINER_NAME}
    restart: always
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
    ports:
      - "80:80"
      - "443:443"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - backend

networks:
  frontend-net:
    driver: bridge
  backend-net:
    internal: true
  db-net:
    internal: true
